baseURL: https://jackrschumacher.github.io/Training-app-docs
locale: "en"
title: Training App Documentation
module:
  imports:
    - path: github.com/imfing/hextra
markup:
  goldmark:
    renderer:
      unsafe: true
outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]
params:
  favicon: /favicon-96x96.png
  description: "Training App Documentation"
  navbar:
    displayLogo: true
    logo:
      path: favicon-96x96.png   # Path relative to 'static'
      width: 25                  # Adjust size as needed
      height: 25
  # banner:
    # key: "announcement"
    # message: This site has recently been migrated to Hugo. Report issues [here](https://github.com/jackrschumacher/website/issues)
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: normal
  blog:
    list:
      displayTags: true
  archives:
    section: blog

  imageZoom:
    enable: true
  toc:
    displayTags: true
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  page:
    # full (100%), wide (90rem), normal (80rem)
    width: normal
    # tabs:
    #   sync: true
    contextMenu:
      enable: true
      links:     
menu:
  main:
   
    # - name: Docs
    #   pageRef: /docs
    #   weight: 1

  
    # - name: Archive
    #   pageRef: /archive
    #   parent: Other
    #   weight: 3
   

    # - name: Blog
    #   pageRef: /blog
    #   weight: 60
      

   

    # --- Hextra Special Features ---
    # These add the Search bar and Sun/Moon icon to the right side
    - name: Search
      params:
        type: search
      weight: 80

    - name: GitHub 
      url: "https://github.com/FRC930/Training_App"
      weight: 90
      params: 
        icon: github
        type: icon
      
    - name: Theme
      params:
        type: theme-toggle
      weight: 100